name: Deploy Lambda

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

      operation:
        description: "Select operation"
        required: true
        type: choice
        options:
          - plan
          - apply
          - update
          - destroy

      region:
        description: "AWS Region"
        required: true
        default: ap-south-1
        type: choice
        options:
          - ap-south-1

env:
  LAMBDA_NAME: hello-lambda-${{ github.event.inputs.environment }}
  S3_BUCKET: lambda-artifacts-demo-${{ github.event.inputs.environment }}
  S3_KEY: lambda-packages/hello-lambda-${{ github.event.inputs.environment }}.zip

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      ####################################################
      # Checkout Repository
      ####################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Configure AWS Credentials
      ####################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      ####################################################
      # Verify AWS Authentication
      ####################################################
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      ####################################################
      # Setup Terraform
      ####################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ####################################################
      # Package Lambda
      ####################################################
      - name: Package Lambda
        if: ${{ github.event.inputs.operation == 'apply' || github.event.inputs.operation == 'update' }}
        run: |
          cd aws-lambda/hello_lambda

          chmod +x install.sh
          ./install.sh

          zip -r hello-lambda-${{ github.event.inputs.environment }}.zip .

          aws s3 cp \
            hello-lambda-${{ github.event.inputs.environment }}.zip \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}

      ####################################################
      # Terraform
      ####################################################
      - name: Terraform Init
        if: ${{ github.event.inputs.operation != 'update' }}
        working-directory: aws-infra/lambda
        run: terraform init

      - name: Terraform Format
        if: ${{ github.event.inputs.operation != 'update' }}
        working-directory: aws-infra/lambda
        run: terraform fmt

      - name: Terraform Validate
        if: ${{ github.event.inputs.operation != 'update' }}
        working-directory: aws-infra/lambda
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.operation == 'plan' }}
        working-directory: aws-infra/lambda
        run: terraform plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.operation == 'apply' }}
        working-directory: aws-infra/lambda
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.operation == 'destroy' }}
        working-directory: aws-infra/lambda
        run: terraform destroy -auto-approve

      ####################################################
      # Update Existing Lambda Code
      ####################################################
      - name: Update Lambda Code
        if: ${{ github.event.inputs.operation == 'update' }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_NAME }} \
            --s3-bucket ${{ env.S3_BUCKET }} \
            --s3-key ${{ env.S3_KEY }}